name: mythic_dice_parser
description: A dart library for parsing dice notation (`2d6+4`). Supports advantage/disadvantage, exploding die, injected rolls, and other variations.
version: 8.0.0
repository: https://github.com/kingdomseed/mythic-dice-parser
publish_to: https://onepub.dev/api/unhuvuhnof/

environment:
  sdk: "^3.8.0"

topics:
  - dice
  - rpg
  - ttrpg

dependencies:
  collection: ^1.0.0
  equatable: ^2.0.0
  fast_immutable_collections: ^11.0.0
  logging: ^1.3.0
  petitparser: ^7.0.2

dev_dependencies:
  args: ^2.0.0
  io: ^1.0.0
  mocktail: ^1.0.0
  test: ^1.0.0
  very_good_analysis: ^10.0.0
